# application-dev.yml 开发配置 热更新 (数据库、端口、JWT)
spring:
  datasource:
    # 配置数据源类型
    type: com.zaxxer.hikari.HikariDataSource
    # 配置连接数据库信息
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bms_boot?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    # HikariCP 连接池优化配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: BookHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
# Redis 配置
# 如果未安装 Redis 服务，将 enabled 设置为 false 即可禁用 Redis 相关功能
  redis:
    enabled: true  # 启用 Redis 缓存优化
    host: localhost
    port: 6379
    database: 0
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s

server:
  port: 8889 #配置后端接口的端口号
  servlet: #配置后端请求的根路径  http://127.0.0.1:8889/api
    context-path: "/api"
#jwt config
jwt:
  tokenHeader: Authorization #JWT 存储的请求头
  secret: ${JWT_SECRET:mall-jwt-test-change-me-in-production} #jwt 加解密使用的密钥
  expiration: 36000000 #JWT 的超时时间
  tokenHead: Bearer #JWT 负载中拿到的开头

# 阿里云 AI 模型配置（请替换为您自己的密钥）
aliyun:
  ai:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    agent-key: ${ALIYUN_AGENT_KEY:your-agent-key}
    app-id: ${ALIYUN_APP_ID:your-app-id}

